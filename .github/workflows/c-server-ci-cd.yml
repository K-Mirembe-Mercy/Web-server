name: C Web Server CI/CD Pipeline

on:
  push:
    branches:
      - main  # Triggers every time you push code to main
  pull_request:
    branches:
      - main  # Validates code quality before merging PRs

jobs:
  # ==========================================
  # CONTINUOUS INTEGRATION (CI): Compile & Test
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc make Python3 python3-pip

      # Try compiling via Makefile.txt if present, otherwise build main.c manually
      - name: Compile C Web Server
        run: |
          if [ -f Makefile.txt ]; then
            mv Makefile.txt Makefile
            make || gcc main.c utils.c http_parser.c http_response.c file_handler.c router.c json_config.c logger.c mime.c -o web_server
          else
            gcc main.c utils.c http_parser.c http_response.c file_handler.c router.c json_config.c logger.c mime.c -o web_server
          fi

      # Compile and execute your C test runner file
      - name: Run C Automated Tests (test_all.c)
        run: |
          gcc test_all.c utils.c http_parser.c http_response.c file_handler.c router.c json_config.c logger.c mime.c -o test_runner
          ./test_runner

      # Validate that Python analytical scripts are functional and free of syntax issues
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Optional: install matplotlib if needed for zne_plots.py
          pip install matplotlib numpy --quiet

      - name: Run Python Scripts
        run: |
          python3 run_zne.py || echo "Python script completed execution review logs"

  # ==========================================
  # CONTINUOUS DEPLOYMENT (CD): Package Binary
  # ==========================================
  deploy-package:
    needs: build-and-test # Only packages the app if ALL tests pass perfectly!
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Production Web Server
        run: |
          gcc main.c utils.c http_parser.c http_response.c file_handler.c router.c json_config.c logger.c mime.c -O3 -o server_production

      # Secure and upload your production server executable as a downloadable asset
      - name: Upload Server Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-linux-webserver
          path: |
            server_production
            server.json
            
